services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/results:/app/results
      - ./backend/work:/app/work
      - ./input:/app/input
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
